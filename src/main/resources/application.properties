
spring.application.name=AkatsukiReportBase
server.port=${PORT}
spring.config.import=optional:file:.env[.properties]


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true



spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=AkatsukiReportBaseSuperSecretKeyForJWTTokenGeneration2024Secure!
jwt.expiration=54000000


# Redirect OpenAI client to Groq
spring.ai.openai.base-url=https://groq.com
spring.ai.openai.api-key=${GROQ_API_KEY}

# Select a Groq hosted model (e.g., Llama 3)
spring.ai.openai.chat.options.model=openai/gpt-oss-120b
